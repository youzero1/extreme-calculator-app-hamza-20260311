version: '3.8'

services:
  extreme-calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extreme-calculator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/calculator.db
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - calculator-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  calculator-data:
    driver: local
